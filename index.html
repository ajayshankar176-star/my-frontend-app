<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #ff5722;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            background: white;
            width: 280px;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .card h3 {
            margin-top: 0;
        }

        .price {
            color: #ff5722;
            font-weight: bold;
        }

        button {
            background: #ff5722;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e64a19;
        }

        footer {
            text-align: center;
            background: #333;
            color: white;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Food Delivery App</h1>
    <p>Jenkins + S3 + CloudFront Pipeline Test</p>
</header>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600" alt="Pizza">
        <div class="card-body">
            <h3>Margherita Pizza</h3>
            <p>Fresh cheese pizza with basil.</p>
            <p class="price">₹299</p>
            <button>Order Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600" alt="Burger">
        <div class="card-body">
            <h3>Chicken Burger</h3>
            <p>Juicy grilled chicken burger.</p>
            <p class="price">₹199</p>
            <button>Order Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600" alt="Biryani">
        <div class="card-body">
            <h3>Chicken Biryani</h3>
            <p>Authentic spicy biryani.</p>
            <p class="price">₹249</p>
            <button>Order Now</button>
        </div>
    </div>

</div>

<footer>
    <p>Deployed using AWS S3 and CloudFront | Pipeline Test v1.0</p>
</footer>

</body>
</html>
