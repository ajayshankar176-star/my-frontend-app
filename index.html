<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine?</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
}

.container {
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    max-width: 500px;
}

h1 {
    font-size: 2.5rem;
}

p {
    font-size: 1.2rem;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1rem;
}

.yes {
    background: #4CAF50;
    color: white;
}

.no {
    background: #f44336;
    color: white;
}

#message {
    margin-top: 20px;
    font-size: 1.5rem;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ Will You Be My Valentine? ❤️</h1>
    <p>You make every day special. Would you like to be my Valentine?</p>

    <button class="yes" onclick="acceptProposal()">Yes 💖</button>
    <button class="no" onclick="declineProposal()">No 😢</button>

    <div id="message"></div>
</div>

<script>
function acceptProposal() {
    document.getElementById("message").innerHTML =
        "🎉 Yay! You made my day! ❤️";
}

function declineProposal() {
    document.getElementById("message").innerHTML =
        "😄 That's okay! Have a wonderful day!";
}
</script>

</body>
</html>
