<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Company Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background-image: url('https://cdn.gulte.com/wp-content/uploads/2026/02/rajini-kamal-glimpse.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.65);
        }

        .login-container{
            position:relative;
            z-index:1;
            width:350px;
            padding:30px;
            background:rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius:15px;
            text-align:center;
            color:white;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        .login-container h1{
            margin-bottom:10px;
            color:#ffd700;
        }

        .login-container p{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#e50914;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#b20710;
        }

        .footer{
            margin-top:15px;
            font-size:12px;
            color:#ddd;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="login-container">
    <h1>CineMonk Company</h1>
    <p> </p>

    <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Powered by AWS S3 + CloudFront
    </div>
</div>

</body>
</html>
